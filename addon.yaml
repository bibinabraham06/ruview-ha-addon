name: RuView HA
slug: ruview_ha
description: WiFi-based presence, fall detection, and vitals monitoring — no cameras.
version: 0.1.0
url: https://github.com/ruview-ha/ruview-ha-addon
arch:
  - amd64
  - aarch64
startup: application
boot: auto
ingress: true
ingress_port: 8099
panel_icon: mdi:wifi
homeassistant: 2024.1.0
host_network: false
options:
  log_level: info
  scan_interval: 1
  intrusion_mode: false
schema:
  log_level: list(debug|info|warning|error)
  scan_interval: int(1,10)
  intrusion_mode: bool
